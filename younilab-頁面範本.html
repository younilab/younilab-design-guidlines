// collapsed 狀態下的 icon 代表（section 用第一個子項目的 icon 代表）
const SECTION_ICONS = {
  "列表頁":"list", "詳情頁":"file", "表單頁":"file-text", "結果頁":"check-circle"
};

function NavSection({label,collapsed}){
  if(collapsed) return null;
  return <div style={{fontSize:11,fontWeight:500,letterSpacing:"0.06em",textTransform:"uppercase",
    color:"#BFBFBF",padding:"16px 16px 4px"}}>{label}</div>;
}
function NavItem({item,active,setActive,collapsed}){
  const isActive = active===item.id;
  const [hov,setHov]=useState(false);
  if(item.type==="section"){
    if(!collapsed) return <NavSection label={item.label}/>;
    // collapsed 時 section 全部隱藏，item 自然排列
    return null;
  }
  if(item.type==="child"){
    const childIcon = CHILD_ICON[item.id] || "file";
    if(collapsed){
      return <div onClick={()=>setActive(item.id)}
        onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
        title={item.label}
        style={{display:"flex",alignItems:"center",justifyContent:"center",
          padding:"10px 0",margin:"1px 8px",borderRadius:8,cursor:"pointer",
          background:isActive?"#E7EAEC":hov?"#FAFAFA":"transparent",transition:"all .12s"}}>
        <FI name={childIcon} size={16} color={isActive?"#0A2B41":"#8C8C8C"}/>
      </div>;
    }
    return <div onClick={()=>setActive(item.id)}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",margin:"1px 8px",
        borderRadius:8,cursor:"pointer",fontSize:13,
        background:isActive?"#E7EAEC":hov?"#FAFAFA":"transparent",
        color:isActive?"#0A2B41":"#595959",fontWeight:isActive?500:400,transition:"all .12s"}}>
      <FI name={childIcon} size={15} color={isActive?"#0A2B41":"#8C8C8C"}/>
      <span style={{flex:1}}>{item.label}</span>
    </div>;
  }
  // type === "item"
  return <div onClick={()=>setActive(item.id)}
    onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
    style={{display:"flex",alignItems:"center",gap:8,
      padding:collapsed?"10px 0":"10px 12px",margin:"1px 8px",borderRadius:8,cursor:"pointer",
      justifyContent:collapsed?"center":"flex-start",
      background:isActive?"#E7EAEC":hov?"#FAFAFA":"transparent",
      color:isActive?"#0A2B41":"#595959",
      fontWeight:isActive?500:400,fontSize:14,transition:"all .12s"}}>
    <FI name={item.icon} size={16} color={isActive?"#0A2B41":"#8C8C8C"}/>
    {!collapsed && <span style={{flex:1}}>{item.label}</span>}
  </div>;
}

        {extra&&<span style={{fontSize:12,color:"#1677FF",cursor:"pointer"}}>{extra}</span>}

      {children}
    </div>
  );
}

    {!checked&&indeterminate&&<div style={{width:8,height:2,background:"#fff",borderRadius:1}}/>}
  </div>;
}

        justifyContent:"center",cursor:"pointer",transition:"background .12s"}}>

}

              </div>
            </Panel>
          </div>

          {/* 次網格：本月預測 + 進行中任務（1:1）*/}
          <div style={{display:"grid",gridTemplateColumns:panelGridCols,gap:16}}>
            <Panel title="本月預測">
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px 16px"}}>
                {[["已完成","0","#389E0D"],["預估月底","0","#1677FF"],["日均完成","0",null],["進行中","3",null]].map(([l,v,c])=>(
                  <div key={l} style={{textAlign:"center"}}><div style={{fontSize:13,color:"#8C8C8C",marginBottom:8}}>{l}</div><div style={{fontSize:24,fontWeight:700,color:c||"#1F1F1F"}}>{v}</div></div>
                ))}

              <div style={{fontSize:13,color:"#BFBFBF",marginTop:16,paddingTop:14,borderTop:"1px solid #F0F0F0"}}>剩餘 17 天，按目前速度預估</div>
            </Panel>
            <Panel title="進行中的任務" extra="查看全部">
              <div style={{display:"flex",flexDirection:"column"}}>
                {tasks.map(([t,p,d],i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"9px 0",borderBottom:i<tasks.length-1?"1px solid #F5F5F5":"none"}}>
                    <span style={{flex:1,fontSize:13,color:"#434343",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",minWidth:0}}>{t}</span>
                    <div style={{width:64,height:4,borderRadius:999,background:"#F0F0F0",overflow:"hidden",flexShrink:0}}><div style={{width:p+"%",height:"100%",background:VIZ_MAIN,borderRadius:999}}/></div>

            {step>0&&<button style={{height:40,padding:"0 16px",borderRadius:8,border:"1px solid #D9D9D9",background:"#fff",fontSize:14,fontWeight:500,cursor:"pointer"}} onClick={()=>setStep(s=>s-1)}>上一步</button>}

    </main>

              <FI name="list" size={32} color="#D9D9D9" style={{margin:"0 auto 12px"}}/>

              <span style={{fontSize:15,fontWeight:600,color:"#1F1F1F"}}>操作記錄</span>

            {[["2024/03/15 14:32","王小明","建立客戶資料"],["2024/03/16 09:15","李大華","更新聯絡方式"],["2024/03/20 16:44","王小明","新增任務"]].map(([time,user,action])=>(
              <div key={time} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 24px",borderBottom:"1px solid #F5F5F5",fontSize:13}}>

// ── 登入頁（對齊設計規範 v2.3）──
function LoginPage({onLogin}){
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [showPw,setShowPw]=useState(false);
  const [remember,setRemember]=useState(false);
  const [loading,setLoading]=useState(false);
  const [emailErr,setEmailErr]=useState("");
  const [pwErr,setPwErr]=useState("");

  const validate=()=>{
    let ok=true;
    if(!email){setEmailErr("請輸入信箱");ok=false;}
    else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){setEmailErr("信箱格式不正確");ok=false;}
    else setEmailErr("");
    if(!pw){setPwErr("請輸入密碼");ok=false;} else setPwErr("");
    return ok;
  };
  const handleLogin=()=>{
    if(!validate()) return;
    setLoading(true);
    setTimeout(()=>{setLoading(false);onLogin();},800);
  };
  const IF=({label,type,value,onChange,placeholder,error,rightEl})=>{
    const [f,setF]=useState(false);
    return (
      <div style={{marginBottom:18}}>
        <label style={{display:"block",fontSize:13,fontWeight:500,color:"#1F1F1F",marginBottom:6}}>{label}</label>
        <div style={{position:"relative"}}>
          <input value={value} onChange={e=>onChange(e.target.value)} type={type} placeholder={placeholder}
            onFocus={()=>setF(true)} onBlur={()=>setF(false)}
            style={{width:"100%",boxSizing:"border-box",height:40,padding:rightEl?"0 40px 0 12px":"0 12px",fontSize:14,fontFamily:"var(--font)",color:"#1F1F1F",background:"#fff",outline:"none",borderRadius:8,
              border:"1px solid "+(error?"#F5222D":f?"#0A2B41":"#D9D9D9"),
              boxShadow:error&&f?"0 0 0 3px rgba(245,34,45,0.08)":f?"0 0 0 3px rgba(10,43,65,0.08)":"none",
              transition:"border-color .15s,box-shadow .15s"}}/>
          {rightEl&&<div style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",display:"flex",cursor:"pointer"}} onClick={rightEl.onClick}>{rightEl.icon}</div>}
        </div>
        {error&&<div style={{display:"flex",alignItems:"center",gap:5,fontSize:13,color:"#CF1322",marginTop:6}}><FI name="alert-circle" size={14} color="#CF1322"/>{error}</div>}
      </div>
    );
  };
  return (
    <div style={{display:"flex",minHeight:"100vh",fontFamily:"var(--font)"}}>
      {/* 左側品牌面板 */}
      <div className="login-left" style={{flex:1,position:"relative",overflow:"hidden",minHeight:"100vh",minWidth:0}}>
        <img src="login-bg.jpg" alt="" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center",display:"block",position:"absolute",inset:0}}/>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,rgba(4,17,27,0.3) 0%,rgba(4,17,27,0.7) 100%)",zIndex:1}}/>
        <div style={{position:"absolute",left:40,bottom:40,zIndex:2}}>
          
          <div style={{fontSize:22,fontWeight:700,color:"#fff",letterSpacing:"-0.01em",marginBottom:8}}>Youni Lab 後台</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.65)",lineHeight:1.6}}>以數據驅動策略，建立搜尋上的長期優勢。</div>
        </div>
      </div>
      {/* 右側表單區 */}
      <div className="login-right" style={{width:480,flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"48px 40px",background:"#fff",position:"relative",minHeight:"100vh"}}>
        <div style={{width:"100%",maxWidth:340}}>
          <div style={{fontSize:26,fontWeight:700,color:"#1F1F1F",letterSpacing:"-0.01em",marginBottom:6}}>歡迎回來</div>
          <div style={{fontSize:14,color:"#8C8C8C",marginBottom:28}}>Youni Lab 後台管理系統</div>
          {/* Google OAuth */}
          <button style={{width:"100%",height:44,border:"1px solid #D9D9D9",borderRadius:8,background:"#fff",color:"#1F1F1F",fontSize:14,fontWeight:500,fontFamily:"var(--font)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,transition:"background .15s"}}
            onMouseEnter={e=>e.currentTarget.style.background="#FAFAFA"}
            onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
            <svg width="18" height="18" viewBox="0 0 18 18">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            使用 Google 帳號登入
          </button>
          {/* OR 分隔 */}
          <div style={{display:"flex",alignItems:"center",gap:12,margin:"20px 0"}}>
            <div style={{flex:1,height:1,background:"#F0F0F0"}}/>
            <span style={{fontSize:12,color:"#BFBFBF",whiteSpace:"nowrap"}}>或使用帳號密碼</span>
            <div style={{flex:1,height:1,background:"#F0F0F0"}}/>
          </div>
          <IF label="信箱" type="email" value={email} onChange={v=>{setEmail(v);setEmailErr("");}} placeholder="your@email.com" error={emailErr}/>
          <IF label="密碼" type={showPw?"text":"password"} value={pw} onChange={v=>{setPw(v);setPwErr("");}} placeholder="輸入密碼" error={pwErr}
            rightEl={{icon:<FI name={showPw?"eye-off":"eye"} size={16} color="#8C8C8C"/>,onClick:()=>setShowPw(v=>!v)}}/>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
            <div onClick={()=>setRemember(v=>!v)} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",userSelect:"none"}}>
              <div style={{width:16,height:16,borderRadius:4,border:"1.5px solid "+(remember?"#0A2B41":"#D9D9D9"),background:remember?"#0A2B41":"#fff",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .12s"}}>
                {remember&&<FI name="check" size={11} color="#fff"/>}
              </div>
              <span style={{fontSize:13,color:"#595959"}}>記住我</span>
            </div>
            <span style={{fontSize:13,color:"#1677FF",cursor:"pointer"}}>忘記密碼？</span>
          </div>
          <button onClick={handleLogin} disabled={loading}
            style={{width:"100%",height:44,border:"none",borderRadius:8,background:loading?"#2E4A5E":"#0A2B41",color:"#fff",fontSize:15,fontWeight:500,fontFamily:"var(--font)",cursor:loading?"not-allowed":"pointer",transition:"background .15s"}}>
            {loading?"登入中…":"登入"}
          </button>
          <div style={{textAlign:"center",fontSize:13,color:"#8C8C8C",marginTop:24}}>
            還沒有帳號？<span style={{color:"#1677FF",fontWeight:500,cursor:"pointer"}}>申請試用</span>
          </div>
        </div>
        <div style={{position:"absolute",bottom:20,left:"50%",transform:"translateX(-50%)",display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#BFBFBF",whiteSpace:"nowrap"}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:"#52C41A"}}/>
          <span>系統狀態：正常</span><span>·</span><span>v2.3</span>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [loggedIn,setLoggedIn]=useState(true);
  const [userMenu,setUserMenu]=useState(false);
  const [active,setActive]=useState("dashboard");
  const [collapsed,setCollapsed]=useState(false);
  const [drawerOpen,setDrawerOpen]=useState(false);
  const [windowWidth,setWindowWidth]=useState(window.innerWidth);

  // ── RWD：監聽視窗寬度，自動調整 sidebar 行為 ──
  useEffect(()=>{
    const onResize=()=>{
      const w=window.innerWidth;
      setWindowWidth(w);
      if(w>=1024){ setCollapsed(false); }       // ≥1024: 展開 240px
      else { setCollapsed(true); }              // <1024: 自動收合 56px
    };
    onResize();
    window.addEventListener("resize",onResize);
    return ()=>window.removeEventListener("resize",onResize);
  },[]);

  const isDrawerMode = false;                   // 不使用 Drawer 模式
  const sidebarWidth = collapsed ? 56 : 240;
  const contentPadding = windowWidth >= 1024 ? "24px 32px" : "16px 20px";
  const crumbs = CRUMBS[active] || ["頁面"];

  const renderPage = () => {
    const ww = windowWidth;
    if(active==="dashboard")        return <DashboardPage windowWidth={ww} contentPadding={contentPadding}/>;
    if(active==="list-basic")       return <ListPage contentPadding={contentPadding}/>;
    if(active==="detail-standard")  return <DetailStandardPage windowWidth={ww} contentPadding={contentPadding}/>;
    if(active==="detail-tabs")      return <DetailTabsPage contentPadding={contentPadding}/>;
    if(active.startsWith("result-"))return <ResultPage variant={active}/>;
    if(active==="list-card")        return <CardListPage windowWidth={ww} contentPadding={contentPadding}/>;
    if(active==="form-basic")       return <FormBasicPage windowWidth={ww} contentPadding={contentPadding}/>;
    if(active==="form-steps")       return <FormStepsPage windowWidth={ww} contentPadding={contentPadding}/>;
    if(active.startsWith("settings-")) return <SettingsPage tab={active.replace("settings-","")} contentPadding={contentPadding}/>;
    if(active==="profile")          return <ProfilePage contentPadding={contentPadding}/>;
    return <PlaceholderPage title="頁面"/>;
  };

  if(!loggedIn) return <LoginPage onLogin={()=>{setLoggedIn(true);setActive("dashboard");}}/>;

  const setPage = id => { setActive(id); setUserMenu(false); if(isDrawerMode) setDrawerOpen(false); };

  const SidebarContent = () => (
    <>
      {/* Logo + collapse btn */}
      <div style={{height:56,padding:"0 14px",borderBottom:"1px solid #F0F0F0",
        display:"flex",alignItems:"center",justifyContent:collapsed&&!isDrawerMode?"center":"space-between",flexShrink:0}}>
        {(!collapsed||isDrawerMode) && <img src={LOGO} alt="Youni Lab" style={{height:24,width:"auto",display:"block",flexShrink:0}}/>}
        {!isDrawerMode && (
          <div onClick={()=>setCollapsed(c=>!c)}
            style={{width:32,height:32,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,transition:"background 120ms"}}
            onMouseEnter={e=>e.currentTarget.style.background="#F0F0F0"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <FI name="sidebar" size={18} color="#8C8C8C"/>
          </div>
        )}
        {isDrawerMode && (
          <div onClick={()=>setDrawerOpen(false)}
            style={{width:32,height:32,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}
            onMouseEnter={e=>e.currentTarget.style.background="#F0F0F0"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <FI name="x" size={18} color="#8C8C8C"/>
          </div>
        )}
      </div>
      {/* 主選單 */}
      <nav style={{padding:"4px 0"}}>
        {NAV.map((n,i)=>(
          <NavItem key={n.id||n.label||i} item={n} active={active} setActive={setPage} collapsed={collapsed&&!isDrawerMode}/>
        ))}
      </nav>
      {/* 分隔線 */}
      <div style={{height:1,background:"#F0F0F0",margin:"0 12px"}}/>
      {/* 設定 + 個人中心 */}
      <div style={{padding:"6px 0 12px"}}>
        {NAV_BOTTOM.map(n=>(
          <NavItem key={n.id} item={n} active={active} setActive={setPage} collapsed={collapsed&&!isDrawerMode}/>
        ))}
      </div>
    </>
  );

  return (
    <div>
      {/* ── Drawer 遮罩（<1024px）── */}
      {isDrawerMode && drawerOpen && (
        <div onClick={()=>setDrawerOpen(false)}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:199,transition:"opacity .2s"}}/>
      )}

      {/* ── Sidebar ── */}
      {isDrawerMode ? (
        /* Drawer 模式：position fixed，transform 滑入 */
        <aside style={{
          width:240,background:"#fff",borderRight:"1px solid #E7EAEC",
          position:"fixed",top:0,left:0,bottom:0,
          display:"flex",flexDirection:"column",
          zIndex:200,
          transform:drawerOpen?"translateX(0)":"translateX(-100%)",
          transition:"transform 250ms ease",
          overflowY:"auto",overflowX:"hidden"
        }}>
          <SidebarContent/>
        </aside>
      ) : (
        /* 一般模式：fixed，寬度切換 */
        <aside style={{
          width:collapsed?56:240,background:"#fff",borderRight:"1px solid #E7EAEC",
          position:"fixed",top:0,left:0,bottom:0,
          display:"flex",flexDirection:"column",
          zIndex:100,transition:"width 200ms ease",overflowY:"auto",overflowX:"hidden"
        }}>
          <SidebarContent/>
        </aside>
      )}

      {/* ── 主內容 ── */}
      <div style={{marginLeft:sidebarWidth,transition:"margin-left 200ms ease"}}>
        {/* Top Header */}
        <header style={{height:56,background:"#fff",borderBottom:"1px solid #F0F0F0",
          display:"flex",alignItems:"center",padding:"0 16px",gap:8,position:"sticky",top:0,zIndex:50,flexShrink:0}}>
          {/* 漢堡鈕（<1024px）*/}
          {isDrawerMode && (
            <div onClick={()=>setDrawerOpen(o=>!o)}
              style={{width:32,height:32,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}
              onMouseEnter={e=>e.currentTarget.style.background="#F0F0F0"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <FI name="menu" size={18} color="#595959"/>
            </div>
          )}
          {/* Breadcrumbs */}
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:13,color:"#8C8C8C",flex:1,minWidth:0,overflow:"hidden"}}>
            {crumbs.map((c,i)=>(
              <React.Fragment key={i}>
                {i>0 && <span style={{color:"#D9D9D9",flexShrink:0}}>/</span>}
                <span style={{color:i===crumbs.length-1?"#1F1F1F":"#8C8C8C",fontWeight:i===crumbs.length-1?500:400,whiteSpace:"nowrap"}}>{c}</span>
              </React.Fragment>
            ))}
          </div>
          {/* search */}
          <div style={{width:32,height:32,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}
            onMouseEnter={e=>e.currentTarget.style.background="#F0F0F0"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <FI name="search" size={18} color="#595959"/>
          </div>
          {/* bell */}
          <div style={{width:32,height:32,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",position:"relative",flexShrink:0}}
            onMouseEnter={e=>e.currentTarget.style.background="#F0F0F0"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <FI name="bell" size={18} color="#595959"/>
            <div style={{position:"absolute",top:5,right:6,width:8,height:8,borderRadius:"50%",background:"#F5222D",border:"1.5px solid #fff"}}/>
          </div>
          <div style={{width:1,height:20,background:"#F0F0F0",margin:"0 4px",flexShrink:0}}/>
          {/* User menu */}
          <div onClick={()=>setUserMenu(o=>!o)} style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer",position:"relative",flexShrink:0}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:"#2E4A5E",color:"#fff",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>CF</div>
            {windowWidth>=640 && <FI name="chevron-down" size={14} color="#8C8C8C"/>}
            {userMenu&&(
              <div style={{position:"absolute",top:40,right:0,width:200,background:"#fff",border:"1px solid #F0F0F0",
                borderRadius:10,boxShadow:"0 8px 24px rgba(0,0,0,0.08)",padding:6,zIndex:200}}>
                <div style={{padding:"8px 10px",borderBottom:"1px solid #F0F0F0",marginBottom:4}}>
                  <div style={{fontSize:13,fontWeight:600}}>Cody Fisher</div>
                  <div style={{fontSize:11,color:"#8C8C8C"}}>c.fisher@gmail.com</div>
                </div>
                {[["user","個人資料","profile"],["settings","帳號設定","settings"],["log-out","登出",null]].map(([ic,t,pg])=>(
                  <div key={t} onClick={()=>pg?setPage(pg):setLoggedIn(false)}
                    style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:6,cursor:"pointer",
                      fontSize:13,color:t==="登出"?"#CF1322":"#595959"}}
                    onMouseEnter={e=>e.currentTarget.style.background="#FAFAFA"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <FI name={ic} size={16} color={t==="登出"?"#CF1322":"#8C8C8C"}/>{t}
                  </div>
                ))}
              </div>
            )}
          </div>
        </header>
        {renderPage()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
